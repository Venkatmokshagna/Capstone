apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: waterborne
spec:
  accessModes:
    - ReadWriteOnce          # Single node read/write (sufficient for MySQL)
  storageClassName: standard  # GKE default StorageClass (standard persistent disk)
  resources:
    requests:
      storage: 5Gi
