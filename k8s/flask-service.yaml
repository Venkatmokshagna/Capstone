apiVersion: v1
kind: Service
metadata:
  name: flask-service
  namespace: waterborne
  labels:
    app: flask-app
spec:
  type: LoadBalancer           # GKE provisions a public Google Cloud IP
  selector:
    app: flask-app
  ports:
    - name: http
      port: 80                 # External port (standard HTTP)
      targetPort: 5000         # Flask internal port
      protocol: TCP
