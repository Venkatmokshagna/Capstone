# ─────────────────────────────────────────────────────────────────
# Flask App Deployment
# Replace YOUR_PROJECT_ID and REGION with your actual GCP values.
# The Jenkins pipeline automatically updates the IMAGE_TAG on each build.
# ─────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: waterborne
  labels:
    app: flask-app
spec:
  replicas: 2                  # 2 replicas for high availability
  selector:
    matchLabels:
      app: flask-app
  strategy:
    type: RollingUpdate        # Zero-downtime deploys
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
        - name: flask-app
          # Jenkins will replace this image tag on each build
          image: asia-south1-docker.pkg.dev/YOUR_PROJECT_ID/waterborne-repo/waterborne-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            # DB connection from ConfigMap (non-sensitive)
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: mysql-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: mysql-config
                  key: DB_PORT
            # DB credentials from Secret (sensitive)
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_NAME
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_PASSWORD   # Reuse or add a dedicated SECRET_KEY secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
